<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>KSE Science Logger</title>

<style>

body{

    margin:0;
    padding:20px;

    font-family:Arial,sans-serif;

    color:white;

    background-image:url('logo.png');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    background-color:#020617;
}

h1{

    text-align:center;
    margin-bottom:20px;

    text-shadow:0 0 10px rgba(0,0,0,0.6);
}

.card{

    background:rgba(15,23,42,0.55);

    backdrop-filter:blur(12px);

    border-radius:20px;

    padding:20px;

    margin-bottom:20px;

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:15px;

    background:linear-gradient(
        45deg,
        rgba(37,99,235,0.9),
        rgba(56,189,248,0.9)
    );

    color:white;

    font-size:18px;

    cursor:pointer;
}

button:hover{

    opacity:0.9;
}

input{

    width:100%;

    padding:12px;

    border:none;

    border-radius:10px;

    margin-top:10px;

    font-size:16px;

    background:rgba(255,255,255,0.08);

    color:white;
}

.label{

    opacity:0.7;

    margin-top:10px;

    font-size:13px;
}

.value{

    font-size:28px;

    font-weight:bold;

    margin-bottom:15px;
}

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:15px;
}

.sensorCard{

    background:rgba(15,23,42,0.45);

    border-radius:15px;

    padding:15px;

    text-align:center;

    border:1px solid rgba(255,255,255,0.05);
}

.icon{

    font-size:30px;

    margin-bottom:10px;
}

#log{

    white-space:pre-wrap;

    font-size:13px;
}

.altimeterContainer{

    width:100%;

    height:250px;

    background:rgba(15,23,42,0.5);

    border-radius:20px;

    position:relative;

    overflow:hidden;

    margin-top:15px;
}

.altitudeBar{

    position:absolute;

    bottom:0;

    width:100%;

    height:0%;

    background:linear-gradient(
        to top,
        rgba(37,99,235,0.85),
        rgba(56,189,248,0.95)
    );

    transition:height 0.5s;
}

.altitudeText{

    position:absolute;

    top:10px;

    width:100%;

    text-align:center;

    font-size:24px;

    font-weight:bold;

    text-shadow:0 0 10px rgba(0,0,0,0.5);
}

.measureBox{

    background:rgba(15,23,42,0.45);

    border-radius:15px;

    padding:15px;

    margin-top:15px;
}

.measureTitle{

    font-size:13px;

    opacity:0.7;
}

.measureValue{

    font-size:22px;

    font-weight:bold;

    margin-bottom:10px;
}

.footer{

    text-align:center;

    opacity:0.5;

    font-size:12px;

    margin-top:30px;
}

</style>

</head>

<body>

<h1>🌍 KSE Science Logger</h1>

<div class="card">

    <button onclick="connectBLE()">
        CONNECT DEVICE
    </button>

</div>

<div class="card">

    <div class="label">
        📍 LOCATION
    </div>

    <input type="text"
           id="location"
           placeholder="Colosseum - Rome">

</div>

<div class="card">

    <div class="grid">

        <div class="sensorCard">

            <div class="icon">🌡️</div>

            <div class="label">
                TEMPERATURE
            </div>

            <div class="value"
                 id="temp">

                 -- °C

            </div>

        </div>

        <div class="sensorCard">

            <div class="icon">💧</div>

            <div class="label">
                HUMIDITY
            </div>

            <div class="value"
                 id="hum">

                 -- %

            </div>

        </div>

        <div class="sensorCard">

            <div class="icon">📡</div>

            <div class="label">
                PRESSURE
            </div>

            <div class="value"
                 id="pres">

                 -- hPa

            </div>

        </div>

        <div class="sensorCard">

            <div class="icon">📏</div>

            <div class="label">
                ALTITUDE
            </div>

            <div class="value"
                 id="alt">

                 -- m

            </div>

        </div>

    </div>

</div>

<div class="card">

    <div class="label">
        📈 ALTITUDE PROGRESS
    </div>

    <div class="altimeterContainer">

        <div class="altitudeBar"
             id="altitudeBar">
        </div>

        <div class="altitudeText"
             id="altitudeText">

             0 m

        </div>

    </div>

</div>

<div class="card">

    <div class="label">
        🧪 MEASUREMENT SESSION
    </div>

    <div class="measureBox">

        <div class="measureTitle">
            BASE MARKED
        </div>

        <div class="measureValue"
             id="basePressure">

             -- hPa

        </div>

        <div class="measureTitle">
            TOP MARKED
        </div>

        <div class="measureValue"
             id="topPressure">

             -- hPa

        </div>

    </div>

</div>

<div class="card">

    <button onclick="saveMeasurement()">
        SAVE MEASUREMENT
    </button>

</div>

<div class="card">

    <button onclick="exportCSV()">
        EXPORT CSV
    </button>

</div>

<div class="card">

    <div id="log"></div>

</div>

<div class="footer">

KSE SCIENCE LOGGER • ESP32 BLE

</div>

<script>

let measurements = [];

let currentData = {

    temp:0,
    hum:0,
    pres:0,
    alt:0,
    base:0,
    top:0
};

async function connectBLE(){

    try{

        const device =
            await navigator.bluetooth.requestDevice({

                acceptAllDevices:true,

                optionalServices:[
                    '4fafc201-1fb5-459e-8fcc-c5c9c331914b'
                ]

            });

        const server =
            await device.gatt.connect();

        const service =
            await server.getPrimaryService(
                '4fafc201-1fb5-459e-8fcc-c5c9c331914b'
            );

        const characteristic =
            await service.getCharacteristic(
                'beb5483e-36e1-4688-b7f5-ea07361b26a8'
            );

        await characteristic.startNotifications();

        characteristic.addEventListener(
            'characteristicvaluechanged',
            handleData
        );

        alert('Connected to KSE Altimeter');

    }

    catch(error){

        alert(
            'Connection Error: ' + error
        );

    }
}

function handleData(event){

    let value =
        new TextDecoder().decode(
            event.target.value
        );

    let data = JSON.parse(value);

    currentData = data;

    document.getElementById('temp').innerText =
        data.temp + ' °C';

    document.getElementById('hum').innerText =
        data.hum + ' %';

    document.getElementById('pres').innerText =
        data.pres + ' hPa';

    document.getElementById('alt').innerText =
        data.alt + ' m';

    document.getElementById('basePressure').innerText =
        data.base + ' hPa';

    document.getElementById('topPressure').innerText =
        data.top + ' hPa';

    document.getElementById('altitudeText').innerText =
        data.alt + ' m';

    let percent =
        Math.min(
            data.alt / 150 * 100,
            100
        );

    document.getElementById(
        'altitudeBar'
    ).style.height = percent + '%';
}

function saveMeasurement(){

    let location =
        document.getElementById(
            'location'
        ).value;

    let entry = {

        location:location,

        temp:currentData.temp,
        hum:currentData.hum,
        pres:currentData.pres,
        alt:currentData.alt,
        base:currentData.base,
        top:currentData.top,

        time:new Date()
            .toLocaleString()

    };

    measurements.push(entry);

    document.getElementById(
        'log'
    ).innerText +=

        entry.time +
        ' | ' +

        entry.location +
        ' | ALT: ' +

        entry.alt +
        'm\n';
}

function exportCSV(){

    let csv =
'TIME,LOCATION,ALTITUDE,BASE,TOP,TEMP,HUMIDITY,PRESSURE\n';

    measurements.forEach(m => {

        csv +=

            m.time + ',' +
            m.location + ',' +
            m.alt + ',' +
            m.base + ',' +
            m.top + ',' +
            m.temp + ',' +
            m.hum + ',' +
            m.pres + '\n';
    });

    const blob =
        new Blob([csv],{

            type:'text/csv'

        });

    const a =
        document.createElement('a');

    a.href =
        URL.createObjectURL(blob);

    a.download =
        'kse_measurements.csv';

    a.click();
}

</script>

</body>
</html>
